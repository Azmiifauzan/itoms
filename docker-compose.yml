services:
  bot:
    build:
      context: .
      network: host
    container_name: itoms_bot
    command: python bot.py
    network_mode: host
    volumes:
      - .:/app
    env_file:
      - .env
    restart: always

  dashboard:
    build:
      context: .
      network: host
    container_name: itoms_dashboard
    command: gunicorn -w 2 -b 0.0.0.0:7770 --timeout 1200 --worker-class gthread --threads 4 "dashboard.app:app"
    network_mode: host
    volumes:
      - .:/app
      - /mnt/data-internal:/app/data-internal 
    env_file:
      - .env
    restart: always