{% extends "base.html" %}
{% block title %}Profile{% endblock %}
{% block content %}

<div class="row justify-content-center">
<div class="col-md-6">
    <h5 class="fw-bold mb-4">👤 Profile</h5>

    <!-- Edit Nama -->
    <div class="card shadow-sm mb-4">
        <div class="card-body">
            <h6 class="fw-bold mb-3">Edit Nama</h6>
            <form method="POST" action="/{{ session.role if session.role != 'kepala_support' else 'support' }}/profile/edit-nama">
                <div class="mb-3">
                    <label class="form-label small fw-semibold">Nama Lengkap</label>
                    <input type="text" name="nama" value="{{ user.nama }}" required class="form-control">
                </div>
                <button type="submit" class="btn btn-primary btn-sm">Simpan</button>
            </form>
        </div>
    </div>

    <!-- Ganti Password -->
    <div class="card shadow-sm">
        <div class="card-body">
            <h6 class="fw-bold mb-3">Ganti Password</h6>
            <form method="POST" action="/{{ session.role if session.role != 'kepala_support' else 'support' }}/profile/ganti-password">
                <div class="mb-3">
                    <label class="form-label small fw-semibold">Password Lama</label>
                    <input type="password" name="password_lama" required class="form-control">
                </div>
                <div class="mb-3">
                    <label class="form-label small fw-semibold">Password Baru</label>
                    <input type="password" name="password_baru" required class="form-control">
                </div>
                <button type="submit" class="btn btn-primary btn-sm">Ganti Password</button>
            </form>
        </div>
    </div>
</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% endblock %}
