<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Masuk — ITOMS</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%232563EB'/%3E%3Crect x='7' y='8' width='18' height='12' rx='2.2' fill='none' stroke='white' stroke-width='2'/%3E%3Cpath d='M13 24h6M16 20v4' stroke='white' stroke-width='2' stroke-linecap='round'/%3E%3Ccircle cx='22.5' cy='11.5' r='2.4' fill='%2306D6A0'/%3E%3C/svg%3E">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root{
            --primary:#2563EB;--primary-dark:#1D4ED8;--accent:#7C6CF3;--cyan:#06D6A0;
            --card:#FFFFFF;--border:#E5E9F0;--text:#10192B;--text-muted:#667085;
        }
        *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
        html,body{height:100%}
        body{
            font-family:'Inter',system-ui,sans-serif;
            display:flex;align-items:center;justify-content:center;
            padding:20px;
            position:relative;
            overflow:hidden;
            background:linear-gradient(160deg,#0B1220 0%,#111A2E 45%,#152241 100%);
            color:var(--text);
        }

        /* ===== Background: siluet jaringan server + partikel ===== */
        .bg-scene{position:fixed;inset:0;z-index:0;overflow:hidden;pointer-events:none}
        .bg-glow{position:absolute;border-radius:50%;filter:blur(60px);opacity:.35}
        .bg-glow.g1{width:480px;height:480px;background:var(--primary);top:-140px;left:-120px}
        .bg-glow.g2{width:420px;height:420px;background:var(--accent);bottom:-160px;right:-100px;opacity:.28}
        .bg-glow.g3{width:280px;height:280px;background:var(--cyan);bottom:10%;left:8%;opacity:.14}

        .bg-grid{position:absolute;inset:0;
            background-image:linear-gradient(rgba(255,255,255,.035) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.035) 1px,transparent 1px);
            background-size:42px 42px;
            mask-image:radial-gradient(ellipse at center, black 10%, transparent 72%);
        }

        .bg-net{position:absolute;inset:0;opacity:.5}
        .bg-net .dot{animation:pulse 3.2s ease-in-out infinite}
        @keyframes pulse{0%,100%{opacity:.25}50%{opacity:.9}}

        .bg-silhouette{position:absolute;right:-40px;bottom:-30px;opacity:.16;width:340px;height:340px}
        @media(max-width:640px){.bg-silhouette{width:220px;height:220px}}

        /* ===== Card ===== */
        .login-card{
            position:relative;z-index:1;
            width:100%;max-width:352px;
            background:rgba(255,255,255,.97);
            backdrop-filter:blur(10px);
            border:1px solid rgba(255,255,255,.6);
            border-radius:22px;
            padding:38px 32px 32px;
            box-shadow:0 30px 70px rgba(0,0,0,.45);
        }
        .brand-icon{
            width:60px;height:60px;border-radius:16px;margin:0 auto 26px;
            background:linear-gradient(135deg,var(--primary),var(--accent));
            display:flex;align-items:center;justify-content:center;color:#fff;
            box-shadow:0 10px 24px rgba(37,99,235,.4);
        }
        .alert{background:#FEF2F2;border:1px solid #FECACA;color:#DC2626;font-size:12.5px;padding:10px 12px;border-radius:9px;margin-bottom:18px;display:flex;align-items:center;gap:8px}
        .form-group{margin-bottom:14px}
        .input-wrap{position:relative}
        .input-wrap .icon{position:absolute;left:13px;top:50%;transform:translateY(-50%);color:var(--text-muted)}
        .form-control{
            width:100%;padding:12px 14px 12px 38px;border:1px solid var(--border);
            border-radius:11px;font-size:13.5px;font-family:inherit;outline:none;
            transition:border-color .15s, box-shadow .15s;background:#F8FAFC;color:var(--text);
        }
        .form-control:focus{border-color:var(--primary);box-shadow:0 0 0 3px rgba(37,99,235,.12);background:#fff}
        .btn-submit{
            width:100%;padding:12px;border:none;border-radius:11px;
            background:linear-gradient(135deg,var(--primary),var(--primary-dark));color:#fff;font-size:13.5px;font-weight:700;
            cursor:pointer;transition:transform .12s,box-shadow .15s;margin-top:8px;
            display:flex;align-items:center;justify-content:center;gap:7px;
            box-shadow:0 8px 18px rgba(37,99,235,.35);letter-spacing:.03em;
        }
        .btn-submit:hover{box-shadow:0 10px 22px rgba(37,99,235,.45)}
        .btn-submit:active{transform:scale(.98)}
        @media(max-width:400px){.login-card{padding:30px 22px 26px}}
    </style>
</head>
<body>
    <div class="bg-scene">
        <div class="bg-glow g1"></div>
        <div class="bg-glow g2"></div>
        <div class="bg-glow g3"></div>
        <div class="bg-grid"></div>
        <svg class="bg-net" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" preserveAspectRatio="xMidYMid slice">
            <g stroke="#7DA6FF" stroke-width="1" opacity=".35">
                <line x1="60" y1="90" x2="220" y2="160"/>
                <line x1="220" y1="160" x2="180" y2="300"/>
                <line x1="220" y1="160" x2="400" y2="120"/>
                <line x1="400" y1="120" x2="560" y2="200"/>
                <line x1="560" y1="200" x2="700" y2="130"/>
                <line x1="180" y1="300" x2="340" y2="380"/>
                <line x1="340" y1="380" x2="540" y2="420"/>
                <line x1="540" y1="420" x2="680" y2="360"/>
                <line x1="400" y1="120" x2="340" y2="380"/>
                <line x1="560" y1="200" x2="540" y2="420"/>
            </g>
            <g fill="#7DA6FF">
                <circle class="dot" cx="60" cy="90" r="3"/><circle class="dot" cx="220" cy="160" r="4" style="animation-delay:.4s"/><circle class="dot" cx="180" cy="300" r="3" style="animation-delay:.8s"/>
                <circle class="dot" cx="400" cy="120" r="4" style="animation-delay:1.2s"/><circle class="dot" cx="560" cy="200" r="4" style="animation-delay:1.6s"/><circle class="dot" cx="700" cy="130" r="3" style="animation-delay:2s"/>
                <circle class="dot" cx="340" cy="380" r="3" style="animation-delay:.6s"/><circle class="dot" cx="540" cy="420" r="4" style="animation-delay:1s"/><circle class="dot" cx="680" cy="360" r="3" style="animation-delay:1.4s"/>
            </g>
        </svg>
        <!-- Siluet monitor/server, tempat gampang diganti kalau ada gambar referensi -->
        <svg class="bg-silhouette" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect x="20" y="30" width="160" height="100" rx="8" stroke="#7DA6FF" stroke-width="3"/>
            <path d="M80 150h40M100 130v20" stroke="#7DA6FF" stroke-width="3" stroke-linecap="round"/>
            <circle cx="150" cy="55" r="6" fill="#06D6A0"/>
            <path d="M40 55h60M40 70h90M40 85h50" stroke="#7DA6FF" stroke-width="3" stroke-linecap="round" opacity=".6"/>
        </svg>
    </div>

    <div class="login-card">
        <div class="brand-icon">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="12" rx="2"/><path d="M9 20h6"/><path d="M12 16v4"/></svg>
        </div>

        {% if error %}
        <div class="alert">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="flex-shrink:0"><path d="M12 3.5 22 20.5H2Z"/><path d="M12 10v4.2"/><path d="M12 17.3h.01"/></svg>
            {{ error }}
        </div>
        {% endif %}

        <form method="POST">
            <div class="form-group">
                <div class="input-wrap">
                    <svg class="icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="8" r="3.5"/><path d="M5 20c0-3.9 3.1-6.5 7-6.5s7 2.6 7 6.5"/></svg>
                    <input type="text" name="username" required class="form-control" placeholder="Username" autofocus>
                </div>
            </div>
            <div class="form-group">
                <div class="input-wrap">
                    <svg class="icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="10.5" width="14" height="9.5" rx="2"/><path d="M8 10.5V7a4 4 0 0 1 8 0v3.5"/></svg>
                    <input type="password" name="password" required class="form-control" placeholder="Password">
                </div>
            </div>
            <button type="submit" class="btn-submit">
                LOGIN
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14"/><path d="M13 6l6 6-6 6"/></svg>
            </button>
        </form>
    </div>
</body>
</html>
