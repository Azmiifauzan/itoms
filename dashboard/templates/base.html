<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}IT Dashboard{% endblock %}</title>
    <link href="/static/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light min-vh-100">

    <nav class="navbar navbar-dark bg-primary px-4">
        <span class="navbar-brand fw-bold">🖥️ IT Dashboard</span>
        <div class="d-flex align-items-center gap-3">
            <a href="/{% if session.role == 'kepala_support' %}support{% else %}{{ session.role }}{% endif %}/dashboard" class="text-white small text-decoration-none">Dashboard</a>
            {% if session.role == 'manager' %}
            <a href="/manager/users" class="text-white small text-decoration-none">Kelola User</a>
            {% endif %}
            <a href="/{% if session.role == 'kepala_support' %}support{% else %}{{ session.role }}{% endif %}/profile" class="text-white small text-decoration-none">Profile</a>
            <span class="text-white small">{{ session.nama }}</span>
            <a href="/jadwal/" class="text-white small text-decoration-none">Jadwal</a>
            <a href="/logout" class="btn btn-light btn-sm">Logout</a>
        </div>
    </nav>

    <div class="container py-4">
        {% block content %}{% endblock %}
    </div>

</body>
</html>
